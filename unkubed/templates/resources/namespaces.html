{% extends "base.html" %}

{% block content %}
<h2>Namespaces</h2>
<div class="code-block">{{ command }}</div>
<table class="resource-table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Status</th>
      <th>Age</th>
    </tr>
  </thead>
  <tbody>
    {% for ns in namespaces %}
    <tr>
      <td class="resource-name">{{ ns.metadata.name }}</td>
      <td>
        <span class="phase-badge phase-{{ (ns.status.phase or 'Unknown')|lower|replace(' ', '-') }}">
          {{ ns.status.phase or "Unknown" }}
        </span>
      </td>
      <td>{{ ns.metadata.creationTimestamp }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
