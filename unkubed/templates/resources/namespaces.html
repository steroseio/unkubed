{% extends "base.html" %}

{% block content %}
<h2>Namespaces</h2>
<div class="code-block">{{ command }}</div>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Status</th>
      <th>Age</th>
    </tr>
  </thead>
  <tbody>
    {% for ns in namespaces %}
    <tr>
      <td>{{ ns.metadata.name }}</td>
      <td>{{ ns.status.phase }}</td>
      <td>{{ ns.metadata.creationTimestamp }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
